# ------------------------------------------------------------------------------
# ServiceAccount: ui
# ------------------------------------------------------------------------------
# PURPOSE:
#   Defines a dedicated Kubernetes ServiceAccount for the Retail Store UI
#   microservice. This identity is used by Pods to interact securely with the
#   Kubernetes API and any associated RBAC permissions.
#
# PRODUCTION‑GRADE NOTES:
#   - Every microservice should have its own ServiceAccount to enforce the
#     principle of least privilege.
#   - RBAC roles/rolebindings should be explicitly associated with this
#     ServiceAccount (not shown here, but recommended for production).
#   - Helm labels are included for traceability, version tracking, and lifecycle
#     management.
#   - No secrets are auto‑mounted unless explicitly configured (best practice).
#
# OPERATIONAL BEHAVIOR:
#   - Pods in the UI Deployment will run under this ServiceAccount.
#   - This enables fine‑grained access control if the UI ever needs to read
#     ConfigMaps, Secrets, or interact with other Kubernetes resources.
#
# OVERALL:
#   A minimal, clean, production‑ready ServiceAccount definition that provides
#   identity isolation and prepares the UI microservice for secure RBAC usage.
# ------------------------------------------------------------------------------
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ui
  labels:
    helm.sh/chart: ui-1.2.4
    app.kubernetes.io/name: ui
    app.kubernetes.io/instance: ui
    app.kubernetes.io/component: service
    app.kubernetes.io/owner: retail-store-sample
    app.kubernetes.io/managed-by: Helm
