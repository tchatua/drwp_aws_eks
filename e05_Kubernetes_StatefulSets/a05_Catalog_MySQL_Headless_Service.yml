apiVersion: v1
kind: Service
metadata:
  name: catalog-mysql                               # Name of the Service (also becomes the DNS domain)
  labels:
    app.kubernetes.io/name: catalog                 # Application label
    app.kubernetes.io/instance: catalog             # Instance identifier
    app.kubernetes.io/component: mysql              # Component type (MySQL DB)
    app.kubernetes.io/owner: store-sample           # Ownership label for grouping/visibility
spec:
  clusterIP: None                                   # HEADLESS SERVICE → No virtual IP; enables direct Pod DNS
  ports:
    - port: 3306                                     # Port exposed by the Service
      targetPort: mysql                              # Maps to the container port named "mysql"
      name: mysql                                    # Logical port name
  selector:
    app.kubernetes.io/name: catalog                  # Must match StatefulSet Pod labels
    app.kubernetes.io/instance: catalog
    app.kubernetes.io/component: mysql
    app.kubernetes.io/owner: store-sample
