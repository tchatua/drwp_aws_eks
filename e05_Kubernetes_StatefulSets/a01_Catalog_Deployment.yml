
# This is a Kubernetes Deployment for the Catalog service.
# Users should create Pods only through a controller, not directly
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalog                          # Name of the Deployment
  labels:
    app.kubernetes.io/name: catalog      # Standard Kubernetes app label
    app.kubernetes.io/instance: catalog             # Instance identifier
    app.kubernetes.io/component: service              # Component type (Service)
    app.kubernetes.io/owner: store-sample    # Ownership label for grouping/visibility
spec:
  replicas: 1                            # Number of Pod replicas to run
  strategy:
    rollingUpdate:
      maxUnavailable: 1                  # During updates, only 1 Pod can be unavailable at a time
    type: RollingUpdate                  # Enables zero‑downtime rolling updates
  selector:
    matchLabels:
      app.kubernetes.io/name: catalog    # Deployment targets Pods with this label
      app.kubernetes.io/instance: catalog             # Instance identifier
      app.kubernetes.io/component: service              # Component type (Service)
      app.kubernetes.io/owner: store-sample    # Ownership label for grouping/visibility
  template:
    metadata:
      labels:
        app.kubernetes.io/name: catalog  # Labels applied to Pods created by this Deployment
        app.kubernetes.io/instance: catalog             # Instance identifier
        app.kubernetes.io/component: service              # Component type (Service)
        app.kubernetes.io/owner: store-sample    # Ownership label for grouping/visibility
    spec:
      securityContext:
        fsGroup: 1000                    # Ensures mounted volumes are owned by group 1000
      containers:
        - name: catalog
          envFrom:
            - configMapRef:
                name: catalog-config    # Reference to the ConfigMap
          securityContext:
            capabilities:
              drop:
              - ALL                      # Drops all Linux capabilities for better security
            readOnlyRootFilesystem: true # Prevents writing to container filesystem
            runAsNonRoot: true           # Ensures container does not run as root
            runAsUser: 1000              # Runs the process as user ID 1000
          image: "public.ecr.aws/aws-containers/retail-store-sample-catalog:1.0.0" # Application container image
          imagePullPolicy: IfNotPresent   # Pull image only if not already cached
          ports:
            - name: http
              containerPort: 8080         # Application listens on port 8080
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /health               # Endpoint used to check if Pod is ready
              port: 8080
          livenessProbe:
            httpGet:
              path: /health               # Endpoint used to check if Pod is alive
              port: 8080                 
          resources:
            limits:
              cpu: 200m                   # Max CPU the container can use (0.2 cores)
              memory: 256Mi               # Max memory allowed
            requests:
              cpu: 100m                   # Minimum CPU guaranteed (0.1 cores)
              memory: 256Mi               # Minimum memory guaranteed
